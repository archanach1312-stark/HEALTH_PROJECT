<!DOCTYPE html>
<html>
<head>
<title>AI Healthcare</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-dark text-white">

<div class="container mt-4">

<div class="d-flex justify-content-between">
<h2>Healthcare System</h2>
<div>
<a href="/history" class="btn btn-secondary">History</a>
<a href="/logout" class="btn btn-danger">Logout</a>
</div>
</div>

<!-- ACCURACY -->
<div class="alert alert-success mt-3">
Model Accuracy: <b>{{ accuracy }}%</b>
</div>

<form action="/predict" method="post" class="card p-3 mt-3">
<input name="Age" placeholder="Age" class="form-control mb-2">
<select name="Gender" class="form-control mb-2"><option>Male</option><option>Female</option></select>
<input name="Blood Pressure" placeholder="BP" class="form-control mb-2">
<input name="Cholesterol" placeholder="Cholesterol" class="form-control mb-2">
<input name="Glucose" placeholder="Glucose" class="form-control mb-2">
<input name="Smoking" placeholder="Smoking" class="form-control mb-2">
<input name="Alcohol Consumption" placeholder="Alcohol" class="form-control mb-2">
<input name="Exercise" placeholder="Exercise" class="form-control mb-2">
<input name="BMI" placeholder="BMI" class="form-control mb-2">
<input name="Family History" placeholder="Family History" class="form-control mb-2">
<button class="btn btn-primary">Predict</button>
</form>

{% if prediction_text %}
<div class="alert alert-info mt-3 text-center">
<h4>{{ prediction_text }}</h4>
</div>
{% endif %}

<!-- Charts -->
<canvas id="chart1"></canvas>
<canvas id="chart2" class="mt-4"></canvas>

</div>

<script>
// Health chart
new Chart(document.getElementById('chart1'), {
type:'line',
data:{labels:{{ ages|tojson }},
datasets:[
{label:'BP', data:{{ bp|tojson }}},
{label:'BMI', data:{{ bmi|tojson }}}
]}
});

// Accuracy chart
new Chart(document.getElementById('chart2'), {
type:'bar',
data:{
labels:['Accuracy'],
datasets:[{label:'Model Accuracy', data:[{{ accuracy }}]}]
}
});
</script>

</body>
</html>
