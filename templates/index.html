<!DOCTYPE html>
<html>
<head>
    <title>AI Healthcare Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg,#0f172a,#020617);
            font-family: 'Poppins', sans-serif;
            color: white;
        }

        .navbar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .card {
            background: rgba(30,41,59,0.7);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-custom {
            background: linear-gradient(45deg,#06b6d4,#3b82f6);
            border: none;
            font-weight: 600;
        }

        .result-box {
            padding: 20px;
            border-radius: 15px;
            margin-top: 15px;
            text-align: center;
        }

        .high { background:#7f1d1d; }
        .normal { background:#064e3b; }

        .score-circle {
            width:120px;
            height:120px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:26px;
            font-weight:bold;
            margin:auto;
            background:#111;
            border:5px solid #06b6d4;
        }

        .risk-bar {
            height: 10px;
            border-radius: 10px;
            background: #1e293b;
            overflow: hidden;
        }

        .risk-fill {
            height: 100%;
            background: linear-gradient(90deg,green,yellow,red);
        }

        input, select {
            background:#020617 !important;
            color:white !important;
            border:none !important;
        }
    </style>
</head>

<body
data-ages='{{ ages | tojson | safe }}'
data-bp='{{ bp | tojson | safe }}'
data-bmi='{{ bmi | tojson | safe }}'
data-score='{{ score | default(0) }}'
data-prediction='{{ prediction_text | default("") }}'
>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand fw-bold">🧠 AI Healthcare Pro</span>
    <div>
        <a href="/history" class="btn btn-outline-light btn-sm">History</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
<div class="row g-4">

<!-- FORM -->
<div class="col-md-6">
<div class="card p-4">

<h5>🧾 Patient Details</h5>

<form action="/predict" method="POST">

<input name="Age" class="form-control mb-2" placeholder="Age" required>

<select name="Gender" class="form-control mb-2">
<option>Male</option>
<option>Female</option>
</select>

<input name="Blood Pressure" class="form-control mb-2" placeholder="Blood Pressure">
<input name="Cholesterol" class="form-control mb-2" placeholder="Cholesterol">
<input name="Glucose" class="form-control mb-2" placeholder="Glucose">
<input name="Smoking" class="form-control mb-2" placeholder="Smoking (0/1)">
<input name="Alcohol Consumption" class="form-control mb-2" placeholder="Alcohol (0/1)">
<input name="Exercise" class="form-control mb-2" placeholder="Exercise (0/1)">
<input name="BMI" class="form-control mb-2" placeholder="BMI">
<input name="Family History" class="form-control mb-2" placeholder="Family History">

<button class="btn btn-custom w-100 mt-2">🚀 Predict</button>

</form>

<!-- RESULT -->
{% if prediction_text %}
<div class="result-box {% if 'High' in prediction_text %}high{% else %}normal{% endif %}">
    {{ prediction_text }}
</div>
{% endif %}

<!-- SCORE -->
{% if score %}
<div class="mt-3 text-center">
    <div class="score-circle">{{ score }}</div>
    <p>Health Score</p>
</div>
{% endif %}

<!-- RISK BAR -->
<div class="mt-3">
    <p>Risk Level</p>
    <div class="risk-bar">
        <div id="riskFill" class="risk-fill" style="width:0%"></div>
    </div>
</div>

<!-- AI SUGGESTIONS -->
<div class="mt-4">
    <h6>🤖 AI Suggestions</h6>
    <ul id="suggestions"></ul>
</div>

</div>
</div>

<!-- CHART -->
<div class="col-md-6">
<div class="card p-4">

<h5>📈 Health Trends</h5>
<canvas id="chart"></canvas>

<hr>
<h6>🎯 Accuracy: {{ accuracy }}%</h6>

</div>
</div>

</div>
</div>

<!-- SCRIPT -->
<script>
    const ages = JSON.parse(document.body.dataset.ages || "[]");
    const bp = JSON.parse(document.body.dataset.bp || "[]");
    const bmi = JSON.parse(document.body.dataset.bmi || "[]");
    const score = parseInt(document.body.dataset.score || "0");
    const prediction = document.body.dataset.prediction || "";

    // Chart
    const ctx = document.getElementById('chart');
    if (ctx && ages.length) {
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ages,
                datasets: [
                    { label: 'BP', data: bp, borderWidth: 2 },
                    { label: 'BMI', data: bmi, borderWidth: 2 }
                ]
            }
        });
    }

    // Risk Meter
    const riskFill = document.getElementById("riskFill");
    if (riskFill) {
        riskFill.style.width = score + "%";
    }

    // AI Suggestions
    const suggestions = document.getElementById("suggestions");

    if (prediction.includes("High")) {
        suggestions.innerHTML = `
            <li>⚠️ Reduce salt intake</li>
            <li>🏃 Exercise regularly</li>
            <li>🚭 Avoid smoking</li>
            <li>🩺 Regular health checkups</li>
        `;
    } else {
        suggestions.innerHTML = `
            <li>✅ Maintain healthy lifestyle</li>
            <li>🥗 Balanced diet</li>
            <li>💪 Keep exercising</li>
        `;
    }
</script>

</body>
</html>
